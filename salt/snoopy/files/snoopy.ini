; Managed by Salt (snoopy state).
;
; Logs interactive user command executions to /dev/log (journald), which the
; OpenTelemetry collector (monitoring.otelcol) forwards to Sentry.
;
; only_tty restricts logging to commands with a controlling TTY -- i.e. commands
; people actually run at a shell (including via sudo) -- and keeps the constant
; nrpe / salt-minion / cron exec churn out of the log. Drop the filter_chain (or
; switch to e.g. "exclude_spawns_of:cron,salt-minion,nrpe") to widen coverage.

[snoopy]
output = devlog
syslog_facility = LOG_AUTHPRIV
syslog_level = LOG_INFO
syslog_ident = "snoopy"
filter_chain = "only_tty"
message_format = "login:%{login} uid:%{uid} euid:%{euid} tty:%{tty} cwd:%{cwd} cmd:%{cmdline}"
