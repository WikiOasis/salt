object NotificationCommand "notify-host-by-discord" {
  command = [ "/etc/icinga2/scripts/discord_host_notification.sh" ]
  env = {
    NOTIFICATIONTYPE = "$notification.type$"
    HOSTNAME         = "$host.name$"
    HOSTSTATE        = "$host.state_text$"
    HOSTOUTPUT       = "$host.output$"
    LONGDATETIME     = "$icinga.long_date_time$"
  }
}

object NotificationCommand "notify-service-by-discord" {
  command = [ "/etc/icinga2/scripts/discord_service_notification.sh" ]
  env = {
    NOTIFICATIONTYPE = "$notification.type$"
    HOSTNAME         = "$host.name$"
    SERVICENAME      = "$service.name$"
    SERVICESTATE     = "$service.state_text$"
    SERVICEOUTPUT    = "$service.output$"
    LONGDATETIME     = "$icinga.long_date_time$"
  }
}

